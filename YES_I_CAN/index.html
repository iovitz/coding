      const arr = [1, [2, 3], [5, 1, 2, [2, 3, [1]]], [2, [[[[2]]]]]]
      const flat = function(arr, depth) {
        const res = []
        arr.forEach(element => {
          if(element instanceof Array) {
            res.push(
              ...flat(element)
            )
          } else {
            res.push(element)
          }
        });
        return res
      }

      )
